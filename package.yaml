name:                hspec-discover-discover
version:             0.1.0.0
github:              "parsonsmatt/hspec-discover-discover"
license:             BSD-3-Clause
author:              "Matt Parsons"
maintainer:          "parsonsmatt@gmail.com"
copyright:           "2026 Matt Parsons"

extra-source-files:
- README.md
- CHANGELOG.md

# Metadata used when publishing your package
# synopsis:            Short description of your package
# category:            Web

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description:         Please see the README on GitHub at <https://github.com/parsonsmatt/hspec-discover-discover#readme>

dependencies:
- base >= 4.7 && < 5
- async
- containers
- directory
- filepath
- optparse-applicative
- text

ghc-options:
- -Wall
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-export-lists
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints

library:
  source-dirs: src

executables:
  hspec-discover-discover:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - hspec-discover-discover

tests:
  hspec-discover-discover-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    build-tools:
    - hspec-discover-discover
    - hspec-discover
    dependencies:
    - hspec-discover-discover
    - hspec
    - optparse-applicative
    - process
    - temporary
